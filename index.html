<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Settler Delivery Calculator</title>

<style>
:root {
  --ink:#111; --muted:#666; --line:#ddd; --radius:22px; --shadow:0 12px 28px rgba(0,0,0,.08);
}
* { box-sizing:border-box; }
body { margin:0; font-family:Inter,Arial,sans-serif; background:linear-gradient(180deg,#fafafa 0%,#ededed 100%); color:var(--ink); }
.wrap { max-width:1320px; margin:0 auto; padding:22px; }

.hero {
  background:#000; color:#fff; border-radius:32px;
  padding:30px 34px; box-shadow:var(--shadow);
  margin-bottom:22px; min-height:168px;
  display:flex; flex-direction:column; justify-content:center;
}

.hero-top {
  display:grid; grid-template-columns: 1fr auto 1fr;
  align-items:center; gap:18px;
}

.hero-center {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
}

.logo {
  width:96px; height:96px; border-radius:50%;
  background:#fff; object-fit:contain; padding:8px;
}

.hero h1 {
  margin:10px 0 0;
  font-size:36px;
}

/* badge remains untouched */
.tauranga-badge-wrap { display:flex; justify-content:flex-end; }
.tauranga-badge {
  display:inline-flex; align-items:center;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff; border-radius:999px;
  padding:10px 16px;
  font-weight:800; font-size:14px;
}

/* palm class still exists (unchanged), just not used */
.tauranga-palm { font-size:18px; }

</style>
</head>

<body>
<div class="wrap">

<section class="hero">
  <div class="hero-top">
    <div></div>

    <div class="hero-center">
      <h1>Early Settler Transport Calculator</h1>
    </div>

    <div class="tauranga-badge-wrap">
      <div class="tauranga-badge">
        <!-- palm removed exactly as requested -->
      </div>
    </div>

  </div>
</section>

</div>
</body>
</html>
